services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8888:8080'
    environment:
      TZ: 'Asia/Dhaka'
      DEV_AUTO_LOGIN_ENABLED: '1'
      DEV_AUTO_LOGIN_EMAIL: 'dev@example.com'
      DEV_AUTO_LOGIN_USERNAME: 'Dev User'
    volumes:
      - ./public:/var/www/html
      - ./scripts:/var/www/scripts
      - ./src:/var/www/src
      - ./tests:/var/www/tests
      - ./vendor:/var/www/vendor
      - ./phpunit.xml:/var/www/phpunit.xml
    depends_on:
      - db

  composer:
    image: composer:2
    working_dir: /app
    volumes:
      - ./:/app

  db:
    image: mysql:8.0
    command: --default-time-zone=+06:00
    environment:
      TZ: 'Asia/Dhaka'
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: productivity_app
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
